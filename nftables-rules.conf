#!/usr/sbin/nft -f
# Tailscale-only remote desktop firewall
#
# This ensures only Tailscale connections can reach the remote desktop service.
# Save to: /etc/nftables.d/remote-desktop.conf
# Reload with: sudo nft -f /etc/nftables.d/remote-desktop.conf

table ip remote-desktop {
    # Only allow connections from Tailscale interface
    chain input {
        type filter hook input priority 0; policy drop

        # Accept from Tailscale interface only
        iifname "tailscale0" tcp dport 3389 accept

        # Accept established/related connections
        ct state established,related accept

        # Log and reject everything else
        log prefix "RD-reject: " reject with icmp port-unreachable
    }
}

